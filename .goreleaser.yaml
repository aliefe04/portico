version: 2

project_name: portico

before:
  hooks:
    - go test ./...

builds:
  - id: portico
    main: ./cmd/portico
    binary: portico
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/aliefe04/portico/internal/version.Version={{.Version}}
      - -X github.com/aliefe04/portico/internal/version.Commit={{.Commit}}
      - -X github.com/aliefe04/portico/internal/version.Date={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: aliefe04
    name: portico
